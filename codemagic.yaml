workflows:
  android-capacitor-workflow:
    name: Capacitor Android Build
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build static web assets
        script: |
          npm run build
      - name: Verify build folder
        script: |
          ls -d out && ls out/index.html || echo "ERROR: out/index.html not found!"
      - name: Add Android platform
        script: |
          npx cap add android || true
      - name: Capacitor sync
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
